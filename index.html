<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Microsoft JhengHei', 'Noto Sans TC', sans-serif; color: #fff; cursor: none; }

/* ── CANVASES ── */
#bg-canvas { position: fixed; inset: 0; z-index: 0; }
#fx-canvas  { position: fixed; inset: 0; z-index: 50; pointer-events: none; }
#cursor-dot { position: fixed; width: 18px; height: 18px; border-radius: 50%; background: #fff; transform: translate(-50%,-50%); pointer-events: none; z-index: 999; box-shadow: 0 0 20px #0ff, 0 0 40px #0ff; transition: transform .05s; }

/* ── SLIDE ── */
#slide {
  position: fixed; inset: 0; z-index: 10;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 6rem 4rem 5rem;
  overflow: hidden;
}

/* ── HUD ── */
#progress { position: fixed; top: 0; left: 0; right: 0; height: 4px; z-index: 200; background: rgba(255,255,255,0.1); }
#progress-bar { height: 100%; background: linear-gradient(90deg, #0ff, #f0f, #ff0); transition: width .4s; box-shadow: 0 0 12px #0ff; }
#slide-counter {
  position: fixed; top: 12px; right: 1.5rem; z-index: 200;
  font-size: 1.1rem; font-weight: 900; color: rgba(255,255,255,0.4);
  letter-spacing: 2px;
}
#slide-title-hud {
  position: fixed; top: 12px; left: 1.5rem; z-index: 200;
  font-size: 1rem; color: rgba(255,255,255,0.3); font-weight: 700;
  max-width: 60vw; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* ── NAV BUTTONS ── */
.nav-btn {
  position: fixed; top: 50%; z-index: 300;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.5); font-size: 2.5rem; width: 60px; height: 100px;
  border-radius: 12px; cursor: none; display: flex; align-items: center; justify-content: center;
  transform: translateY(-50%); transition: all .2s; user-select: none;
}
.nav-btn:hover { background: rgba(0,255,255,0.15); border-color: rgba(0,255,255,0.5); color: #0ff; box-shadow: 0 0 30px rgba(0,255,255,0.3); }
#btn-prev { left: 0.5rem; }
#btn-next { right: 0.5rem; }

/* ── SLIDE CONTENT STYLES ── */
.slide-bg-1  { background: radial-gradient(ellipse at 30% 50%, #0a0060 0%, #000 60%), radial-gradient(ellipse at 80% 30%, #300060 0%, transparent 50%); }
.slide-bg-2  { background: radial-gradient(ellipse at center, #200010 0%, #000 70%); }
.slide-bg-3  { background: radial-gradient(ellipse at center, #001030 0%, #000 70%); }
.slide-bg-4  { background: radial-gradient(ellipse at 20% 60%, #002030 0%, #000 60%), radial-gradient(ellipse at 80% 40%, #100020 0%, transparent 50%); }
.slide-bg-5  { background: radial-gradient(ellipse at center, #003020 0%, #000 70%); }
.slide-bg-6  { background: radial-gradient(ellipse at center, #001530 0%, #000 70%); }
.slide-bg-7  { background: radial-gradient(ellipse at 50% 70%, #200030 0%, #000 60%); }
.slide-bg-8  { background: radial-gradient(ellipse at center, #100030 0%, #000 70%); }
.slide-bg-9  { background: radial-gradient(ellipse at center, #002015 0%, #000 70%); }
.slide-bg-10 { background: radial-gradient(ellipse at center, #201500 0%, #000 70%); }
.slide-bg-11 { background: radial-gradient(ellipse at center, #100020 0%, #000 70%); }
.slide-bg-12 { background: radial-gradient(ellipse at center, #001520 0%, #000 70%); }
.slide-bg-13 { background: radial-gradient(ellipse at 50% 100%, #200030 0%, #000 60%); }

/* ── TEXT SIZES ── */
.txt-hero  { font-size: clamp(3.5rem, 10vw, 9rem); font-weight: 900; line-height: 1.05; }
.txt-title { font-size: clamp(3rem, 7vw, 6.5rem); font-weight: 900; line-height: 1.1; }
.txt-sub   { font-size: clamp(1.6rem, 3.5vw, 3rem); font-weight: 700; line-height: 1.4; }
.txt-body  { font-size: clamp(1.3rem, 2.5vw, 2.2rem); line-height: 1.7; }
.txt-small { font-size: clamp(1rem, 1.8vw, 1.6rem); line-height: 1.6; }
.txt-num   { font-size: clamp(4rem, 10vw, 10rem); font-weight: 900; line-height: 1; }

/* ── GLOW COLORS ── */
.c-teal   { color: #00ffff; text-shadow: 0 0 20px #00ffff, 0 0 40px #00aaff; }
.c-purple { color: #cc00ff; text-shadow: 0 0 20px #cc00ff, 0 0 40px #8800cc; }
.c-pink   { color: #ff00cc; text-shadow: 0 0 20px #ff00cc, 0 0 40px #cc0088; }
.c-gold   { color: #ffd700; text-shadow: 0 0 20px #ffd700, 0 0 40px #ffaa00; }
.c-green  { color: #00ff88; text-shadow: 0 0 20px #00ff88, 0 0 40px #00cc66; }
.c-red    { color: #ff4444; text-shadow: 0 0 20px #ff4444, 0 0 40px #cc0000; }
.c-orange { color: #ff8800; text-shadow: 0 0 20px #ff8800, 0 0 40px #cc6600; }
.c-white  { color: #ffffff; text-shadow: 0 0 20px rgba(255,255,255,0.6); }

.grad-rainbow {
  background: linear-gradient(135deg, #00ffff, #bf00ff, #ff00aa, #ffd700);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 30px rgba(0,255,255,0.5));
}
.grad-fire {
  background: linear-gradient(135deg, #ff8800, #ff4444, #ff00aa);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.grad-ice {
  background: linear-gradient(135deg, #fff, #00ffff, #0088ff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.grad-gold {
  background: linear-gradient(135deg, #fff 20%, #ffd700);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 20px rgba(255,215,0,0.5));
}

/* ── BADGE ── */
.badge {
  display: inline-block; padding: 6px 24px; border-radius: 30px;
  font-size: clamp(0.9rem, 1.5vw, 1.3rem); font-weight: 900; letter-spacing: 3px;
  margin-bottom: 1.5rem;
}
.badge-teal { background: rgba(0,255,255,0.12); border: 1px solid rgba(0,255,255,0.4); color: #0ff; box-shadow: 0 0 20px rgba(0,255,255,0.2); }
.badge-red  { background: rgba(255,50,50,0.12); border: 1px solid rgba(255,50,50,0.4); color: #f66; box-shadow: 0 0 20px rgba(255,50,50,0.2); }
.badge-gold { background: rgba(255,215,0,0.12); border: 1px solid rgba(255,215,0,0.4); color: #ffd700; box-shadow: 0 0 20px rgba(255,215,0,0.2); }
.badge-purple { background: rgba(200,0,255,0.12); border: 1px solid rgba(200,0,255,0.4); color: #c0f; box-shadow: 0 0 20px rgba(200,0,255,0.2); }
.badge-green { background: rgba(0,255,136,0.12); border: 1px solid rgba(0,255,136,0.4); color: #0f8; box-shadow: 0 0 20px rgba(0,255,136,0.2); }

/* ── CARDS ── */
.cards-row { display: flex; gap: 2rem; justify-content: center; flex-wrap: wrap; width: 100%; }
.card {
  flex: 1; min-width: 220px; max-width: 320px;
  background: rgba(255,255,255,0.04); border-radius: 20px; padding: 2rem 1.5rem;
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 0 30px rgba(0,0,0,0.5);
}
.card-teal   { border-color: rgba(0,255,255,0.3); box-shadow: 0 0 30px rgba(0,255,255,0.1); }
.card-purple { border-color: rgba(200,0,255,0.3); box-shadow: 0 0 30px rgba(200,0,255,0.1); }
.card-green  { border-color: rgba(0,255,136,0.3); box-shadow: 0 0 30px rgba(0,255,136,0.1); }
.card-gold   { border-color: rgba(255,215,0,0.3); box-shadow: 0 0 30px rgba(255,215,0,0.1); }

/* ── BULLET ── */
.bullets { text-align: left; max-width: 900px; margin: 0 auto; }
.bullet { display: flex; gap: 1rem; margin-bottom: 0.8rem; align-items: flex-start; }
.bullet::before { content: '◆'; flex-shrink: 0; margin-top: 4px; }
.bullet-teal::before   { color: #0ff; text-shadow: 0 0 8px #0ff; }
.bullet-green::before  { color: #0f8; text-shadow: 0 0 8px #0f8; }
.bullet-red::before    { color: #f44; text-shadow: 0 0 8px #f44; }
.bullet-gold::before   { color: #fd0; text-shadow: 0 0 8px #fd0; }
.bullet-purple::before { color: #c0f; text-shadow: 0 0 8px #c0f; }

/* ── STAT BOXES ── */
.stats-row { display: flex; gap: 2.5rem; justify-content: center; flex-wrap: wrap; margin-top: 1rem; }
.stat-box { text-align: center; }
.stat-num { font-size: clamp(4rem, 9vw, 8rem); font-weight: 900; line-height: 1; }
.stat-lbl { font-size: clamp(1rem, 2vw, 1.6rem); color: rgba(255,255,255,0.5); margin-top: 0.25rem; }

/* ── IMAGES GRID ── */
.img-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; width: 100%; max-width: 900px; }
.img-grid img { width: 100%; border-radius: 12px; border: 1px solid rgba(255,255,255,0.15); filter: brightness(0.9); transition: all .3s; cursor: none; }
.img-grid img:hover { filter: brightness(1.2); border-color: #0ff; box-shadow: 0 0 20px rgba(0,255,255,0.3); transform: scale(1.04); }
.img-2 { grid-template-columns: repeat(2, 1fr); }
.img-4 { grid-template-columns: repeat(2, 1fr); }

/* ── VIDEO ── */
.video-wrap { width: 100%; max-width: 900px; border-radius: 16px; overflow: hidden; border: 2px solid rgba(0,255,255,0.3); box-shadow: 0 0 60px rgba(0,255,255,0.2), 0 0 120px rgba(191,0,255,0.1); background: #000; }
.video-wrap video { width: 100%; display: block; max-height: 55vh; object-fit: contain; background: #000; }

/* ── FLOW ── */
.flow-row { display: flex; align-items: center; justify-content: center; gap: 1rem; flex-wrap: wrap; }
.flow-box { background: rgba(0,255,255,0.06); border: 1px solid rgba(0,255,255,0.25); border-radius: 14px; padding: 1rem 2rem; font-size: clamp(1rem, 2vw, 1.7rem); font-weight: 700; }
.flow-box.done { background: rgba(0,255,136,0.08); border-color: rgba(0,255,136,0.35); }
.flow-arrow-h { font-size: 2rem; color: #0ff; text-shadow: 0 0 10px #0ff; }
.flow-arrow-v { font-size: 2.5rem; color: #0ff; text-shadow: 0 0 10px #0ff; display: block; text-align: center; }

/* ── ENTER ANIMATIONS ── */
@keyframes enterDown  { from{opacity:0;transform:translateY(-50px)} to{opacity:1;transform:none} }
@keyframes enterUp    { from{opacity:0;transform:translateY(50px)} to{opacity:1;transform:none} }
@keyframes enterLeft  { from{opacity:0;transform:translateX(60px)} to{opacity:1;transform:none} }
@keyframes enterScale { from{opacity:0;transform:scale(0.5)} to{opacity:1;transform:scale(1)} }
@keyframes enterGlow  { from{opacity:0;filter:blur(20px) brightness(3)} to{opacity:1;filter:none} }
@keyframes pulse-glow { 0%,100%{filter:drop-shadow(0 0 10px currentColor)} 50%{filter:drop-shadow(0 0 40px currentColor)} }

.anim-1 { animation: enterDown  .5s cubic-bezier(.2,.8,.2,1) .1s both; }
.anim-2 { animation: enterUp    .5s cubic-bezier(.2,.8,.2,1) .25s both; }
.anim-3 { animation: enterLeft  .5s cubic-bezier(.2,.8,.2,1) .4s both; }
.anim-4 { animation: enterScale .5s cubic-bezier(.2,.8,.2,1) .55s both; }
.anim-5 { animation: enterGlow  .6s ease .7s both; }

/* ── GLITCH CLASS (applied during transition) ── */
.glitch { animation: glitch-shake .15s infinite; }
@keyframes glitch-shake {
  0%   { transform: translate(0,0); clip-path: inset(0); }
  20%  { transform: translate(-4px, 2px); clip-path: inset(20% 0 30% 0); filter: hue-rotate(90deg); }
  40%  { transform: translate(4px,-2px); clip-path: inset(50% 0 10% 0); }
  60%  { transform: translate(-2px, 4px); clip-path: inset(10% 0 60% 0); filter: hue-rotate(180deg); }
  80%  { transform: translate(3px,-1px); clip-path: inset(40% 0 20% 0); }
  100% { transform: translate(0,0); clip-path: inset(0); filter: none; }
}

/* ── LIGHTBOX ── */
#lightbox { display:none; position:fixed; inset:0; z-index:500; background:rgba(0,0,0,0.95); align-items:center; justify-content:center; cursor:none; }
#lightbox.open{display:flex;}
#lightbox img { max-width:90vw; max-height:90vh; border-radius:12px; border:2px solid #0ff; box-shadow:0 0 60px rgba(0,255,255,0.4); }
#lb-close { position:absolute; top:1.5rem; right:2rem; font-size:3rem; color:#0ff; cursor:none; text-shadow:0 0 15px #0ff; }
</style>

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
let cur = 0, busy = false;
const TRANS_TYPES = ['shockwave','sweep','vortex','glitch','lightning','pixel'];

// ══════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════
function renderSlide(i) {
  const s = SLIDES[i];
  const el = document.getElementById('slide');
  el.className = s.bg;
  el.innerHTML = s.html;
  document.getElementById('progress-bar').style.width = ((i+1)/SLIDES.length*100)+'%';
  document.getElementById('slide-counter').textContent = (i+1)+' / '+SLIDES.length;
  document.getElementById('slide-title-hud').textContent = s.title;
  // Re-attach video if on video slide
  const vid = document.getElementById('demo-video');
  if (vid) vid.addEventListener('click', e => e.stopPropagation());
}

// ══════════════════════════════════════════════
//  NAVIGATE
// ══════════════════════════════════════════════
function navigate(dir) {
  if (busy) return;
  const next = cur + dir;
  if (next < 0 || next >= SLIDES.length) return;
  busy = true;
  const type = TRANS_TYPES[Math.floor(Math.random() * TRANS_TYPES.length)];
  playSound(type);
  runTransition(type, cur, next, () => {
    cur = next;
    renderSlide(cur);
    busy = false;
  });
}

// ══════════════════════════════════════════════
//  TRANSITION ENGINE
// ══════════════════════════════════════════════
const fxCanvas = document.getElementById('fx-canvas');
const fxCtx = fxCanvas.getContext('2d');
function resizeFx() { fxCanvas.width = window.innerWidth; fxCanvas.height = window.innerHeight; }
resizeFx();
window.addEventListener('resize', resizeFx);

function runTransition(type, from, to, done) {
  const W = fxCanvas.width, H = fxCanvas.height;
  const color = SLIDES[to].color;
  let start = null;
  const DUR = 700;
  let swapped = false;

  // Add glitch class during transition
  const slideEl = document.getElementById('slide');
  if (type === 'glitch') slideEl.classList.add('glitch');

  function tick(ts) {
    if (!start) start = ts;
    const t = Math.min((ts - start) / DUR, 1);
    fxCtx.clearRect(0, 0, W, H);

    // At midpoint, swap content
    if (t >= 0.45 && !swapped) {
      swapped = true;
      renderSlide(to);
    }

    const p = t < 0.5 ? t*2 : (1-t)*2; // 0→1→0

    switch (type) {
      case 'shockwave': drawShockwave(p, W, H, color); break;
      case 'sweep':     drawSweep(p, W, H, color); break;
      case 'vortex':    drawVortex(p, W, H, color); break;
      case 'glitch':    drawGlitch(p, W, H); break;
      case 'lightning': drawLightning(p, W, H, color); break;
      case 'pixel':     drawPixel(p, W, H, color); break;
    }

    if (t < 1) { requestAnimationFrame(tick); }
    else {
      fxCtx.clearRect(0, 0, W, H);
      slideEl.classList.remove('glitch');
      done();
    }
  }
  requestAnimationFrame(tick);
}

function ease(t) { return t < .5 ? 2*t*t : -1+(4-2*t)*t; }

function drawShockwave(p, W, H, color) {
  const ep = ease(p);
  const maxR = Math.sqrt(W*W+H*H)*0.6;
  const r = maxR * ep;
  const grd = fxCtx.createRadialGradient(W/2,H/2,0,W/2,H/2,r);
  grd.addColorStop(0, color+'33');
  grd.addColorStop(0.7, color+'99');
  grd.addColorStop(1, 'transparent');
  fxCtx.beginPath();
  fxCtx.arc(W/2,H/2,r,0,Math.PI*2);
  fxCtx.fillStyle = grd;
  fxCtx.fill();
  // Ring
  fxCtx.beginPath();
  fxCtx.arc(W/2,H/2,r,0,Math.PI*2);
  fxCtx.strokeStyle = color;
  fxCtx.lineWidth = 6*(1-ep)+2;
  fxCtx.globalAlpha = (1-ep)*0.9+0.1;
  fxCtx.stroke();
  fxCtx.globalAlpha = 1;
}

function drawSweep(p, W, H, color) {
  const x = W * ease(p) * 1.4 - W*0.2;
  fxCtx.save();
  fxCtx.transform(1, 0, -0.3, 1, 0, 0);
  fxCtx.fillStyle = color+'bb';
  fxCtx.shadowBlur = 60; fxCtx.shadowColor = color;
  fxCtx.fillRect(x-80, 0, 160, H);
  fxCtx.shadowBlur = 0;
  fxCtx.fillStyle = color+'22';
  fxCtx.fillRect(0, 0, x+80, H);
  fxCtx.restore();
}

function drawVortex(p, W, H, color) {
  const ep = ease(p);
  fxCtx.save();
  fxCtx.translate(W/2, H/2);
  for (let i = 0; i < 12; i++) {
    const angle = (i/12)*Math.PI*2 + ep*Math.PI*6;
    const len = Math.max(W,H) * ep * 0.8;
    fxCtx.beginPath();
    fxCtx.moveTo(0,0);
    fxCtx.lineTo(Math.cos(angle)*len, Math.sin(angle)*len);
    fxCtx.strokeStyle = color;
    fxCtx.lineWidth = 4*(1-ep)+1;
    fxCtx.globalAlpha = (1-ep)*0.7+0.05;
    fxCtx.stroke();
  }
  fxCtx.globalAlpha = 1;
  fxCtx.restore();
  fxCtx.fillStyle = color+'33';
  fxCtx.beginPath();
  fxCtx.arc(W/2,H/2, Math.max(W,H)*ep*0.7, 0, Math.PI*2);
  fxCtx.fill();
}

function drawGlitch(p, W, H) {
  const strips = 12;
  const colors = ['#f00','#0ff','#f0f','#ff0','#0f0','#00f'];
  for (let i = 0; i < strips; i++) {
    const y = (i/strips)*H;
    const h = H/strips;
    const offset = (Math.random()-0.5)*120*p;
    fxCtx.fillStyle = colors[i%colors.length]+'55';
    fxCtx.fillRect(offset, y, W, h);
  }
  fxCtx.fillStyle = `rgba(255,255,255,${p*0.3})`;
  fxCtx.fillRect(0,0,W,H);
}

const bolts = [];
function drawLightning(p, W, H, color) {
  if (p > 0.05 && bolts.length === 0) {
    // Generate bolt
    let x = W*0.3+Math.random()*W*0.4, y = 0;
    bolts.push({pts:[{x,y}]});
    while (y < H*0.9) {
      y += 30+Math.random()*50;
      x += (Math.random()-0.5)*120;
      bolts[0].pts.push({x,y});
    }
  }
  // Flash
  fxCtx.fillStyle = `rgba(255,255,255,${p*0.4})`;
  fxCtx.fillRect(0,0,W,H);
  // Draw bolt
  if (bolts.length > 0) {
    const b = bolts[0];
    fxCtx.beginPath();
    fxCtx.moveTo(b.pts[0].x, b.pts[0].y);
    b.pts.forEach(pt => fxCtx.lineTo(pt.x, pt.y));
    fxCtx.strokeStyle = color;
    fxCtx.lineWidth = 3;
    fxCtx.shadowBlur = 30;
    fxCtx.shadowColor = color;
    fxCtx.globalAlpha = Math.min(p*4, 1) * (1-p*0.8);
    fxCtx.stroke();
    fxCtx.shadowBlur = 0;
    fxCtx.globalAlpha = 1;
  }
  if (p > 0.9) bolts.length = 0;
}

const pixelGrid = [];
function drawPixel(p, W, H, color) {
  const SZ = 40;
  const cols = Math.ceil(W/SZ), rows = Math.ceil(H/SZ);
  if (pixelGrid.length === 0) {
    for (let i = 0; i < cols*rows; i++) {
      pixelGrid.push({ x:(i%cols)*SZ, y:Math.floor(i/cols)*SZ, delay:Math.random() });
    }
  }
  pixelGrid.forEach(px => {
    const localT = Math.max(0, Math.min(1, (p - px.delay*0.4) / 0.6));
    const a = localT < 0.5 ? localT*2 : (1-localT)*2;
    if (a > 0) {
      fxCtx.fillStyle = color;
      fxCtx.globalAlpha = a * 0.85;
      fxCtx.fillRect(px.x, px.y, SZ, SZ);
    }
  });
  fxCtx.globalAlpha = 1;
  if (p > 0.95) pixelGrid.length = 0;
}

// ══════════════════════════════════════════════
//  SOUND ENGINE
// ══════════════════════════════════════════════
let audioCtx;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function playSound(type) {
  try {
    const ctx = getAudio();
    const gain = ctx.createGain();
    gain.connect(ctx.destination);
    gain.gain.setValueAtTime(0.25, ctx.currentTime);

    if (type === 'shockwave' || type === 'sweep') {
      // Whoosh
      const buf = ctx.createBuffer(1,ctx.sampleRate*0.4,ctx.sampleRate);
      const data = buf.getChannelData(0);
      for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1)*Math.exp(-i/data.length*5)*(i/data.length);
      const src = ctx.createBufferSource(); src.buffer=buf;
      const filter = ctx.createBiquadFilter(); filter.type='bandpass'; filter.frequency.value=800; filter.Q.value=0.5;
      src.connect(filter); filter.connect(gain); src.start();
    } else if (type === 'vortex') {
      // Rising tone
      const osc = ctx.createOscillator(); osc.connect(gain);
      osc.frequency.setValueAtTime(80, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(800, ctx.currentTime+0.5);
      gain.gain.setValueAtTime(0.2, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.6);
      osc.start(); osc.stop(ctx.currentTime+0.6);
    } else if (type === 'glitch') {
      // Digital noise
      const buf = ctx.createBuffer(1,ctx.sampleRate*0.2,ctx.sampleRate);
      const data = buf.getChannelData(0);
      for(let i=0;i<data.length;i++) data[i]=Math.random()*2-1;
      const src = ctx.createBufferSource(); src.buffer=buf;
      const filter = ctx.createBiquadFilter(); filter.type='highpass'; filter.frequency.value=2000;
      src.connect(filter); filter.connect(gain);
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.25);
      src.start();
    } else if (type === 'lightning') {
      // Crack
      const buf = ctx.createBuffer(1,ctx.sampleRate*0.15,ctx.sampleRate);
      const data = buf.getChannelData(0);
      for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1)*Math.exp(-i/(data.length*0.1));
      const src = ctx.createBufferSource(); src.buffer=buf;
      src.connect(gain); src.start();
      gain.gain.setValueAtTime(0.4, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.2);
    } else if (type === 'pixel') {
      // Crystalline ping
      const osc = ctx.createOscillator(); osc.type='triangle'; osc.connect(gain);
      osc.frequency.setValueAtTime(1200, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(300, ctx.currentTime+0.4);
      gain.gain.setValueAtTime(0.2, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.4);
      osc.start(); osc.stop(ctx.currentTime+0.4);
    }
  } catch(e) {}
}

// ══════════════════════════════════════════════
//  BG PARTICLES
// ══════════════════════════════════════════════
const bgCanvas = document.getElementById('bg-canvas');
const bgCtx = bgCanvas.getContext('2d');
function resizeBg() { bgCanvas.width=window.innerWidth; bgCanvas.height=window.innerHeight; }
resizeBg(); window.addEventListener('resize', resizeBg);

const COLS=['rgba(0,255,255,','rgba(191,0,255,','rgba(255,0,170,','rgba(255,215,0,','rgba(0,255,136,','rgba(255,255,255,'];
const stars=Array.from({length:250},()=>({
  x:Math.random()*window.innerWidth, y:Math.random()*window.innerHeight,
  r:Math.random()*1.8+0.2, speed:Math.random()*0.3+0.05,
  op:Math.random()*0.5+0.1, c:COLS[Math.floor(Math.random()*COLS.length)],
  tw:Math.random()*Math.PI*2, ts:Math.random()*0.02+0.005,
}));
const shooters=[];
setInterval(()=>{
  if(shooters.length<5) shooters.push({
    x:Math.random()*bgCanvas.width, y:Math.random()*bgCanvas.height*0.5,
    len:100+Math.random()*200, speed:8+Math.random()*6,
    angle:Math.PI/4+(Math.random()-.5)*.4, life:1,
    c:['#0ff','#f0f','#ff0','#0f8','#f80'][Math.floor(Math.random()*5)]
  });
},2000);

function bgLoop(){
  const W=bgCanvas.width,H=bgCanvas.height;
  bgCtx.clearRect(0,0,W,H);
  stars.forEach(s=>{
    s.tw+=s.ts;
    const a=s.op*(0.4+0.6*Math.sin(s.tw));
    bgCtx.beginPath(); bgCtx.arc(s.x,s.y,s.r,0,Math.PI*2);
    bgCtx.fillStyle=s.c+a+')'; bgCtx.shadowBlur=4; bgCtx.shadowColor=s.c+'0.8)';
    bgCtx.fill(); bgCtx.shadowBlur=0;
    s.y-=s.speed; if(s.y<-5){s.y=H+5;s.x=Math.random()*W;}
  });
  for(let i=shooters.length-1;i>=0;i--){
    const ss=shooters[i];
    const g=bgCtx.createLinearGradient(ss.x,ss.y,ss.x-Math.cos(ss.angle)*ss.len,ss.y-Math.sin(ss.angle)*ss.len);
    g.addColorStop(0,ss.c+'cc'); g.addColorStop(1,'transparent');
    bgCtx.beginPath(); bgCtx.moveTo(ss.x,ss.y);
    bgCtx.lineTo(ss.x-Math.cos(ss.angle)*ss.len,ss.y-Math.sin(ss.angle)*ss.len);
    bgCtx.strokeStyle=g; bgCtx.lineWidth=2; bgCtx.globalAlpha=ss.life; bgCtx.stroke();
    bgCtx.globalAlpha=1;
    ss.x+=Math.cos(ss.angle)*ss.speed; ss.y+=Math.sin(ss.angle)*ss.speed;
    ss.life-=0.015; if(ss.life<=0) shooters.splice(i,1);
  }
  requestAnimationFrame(bgLoop);
}
bgLoop();

// ══════════════════════════════════════════════
//  CURSOR + SPARKLES
// ══════════════════════════════════════════════
const curDot=document.getElementById('cursor-dot');
let sparkTick=0;
document.addEventListener('mousemove',e=>{
  curDot.style.left=e.clientX+'px'; curDot.style.top=e.clientY+'px';
  if(++sparkTick%2===0) spawnSpark(e.clientX,e.clientY);
});
const SPARK_COLS=['#0ff','#f0f','#ff0','#0f8','#f80','#fff','#88f'];
function spawnSpark(x,y){
  const el=document.createElement('div');
  const sz=Math.random()*10+4;
  const c=SPARK_COLS[Math.floor(Math.random()*SPARK_COLS.length)];
  const dx=(Math.random()-.5)*60, dy=-Math.random()*60-10;
  el.style.cssText=`position:fixed;left:${x}px;top:${y}px;width:${sz}px;height:${sz}px;
    border-radius:50%;pointer-events:none;z-index:998;background:${c};
    box-shadow:0 0 ${sz*2}px ${c};transform:translate(-50%,-50%);`;
  document.body.appendChild(el);
  el.animate([
    {opacity:1,transform:`translate(-50%,-50%) scale(1)`},
    {opacity:0,transform:`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px)) scale(0)`}
  ],{duration:600,easing:'ease-out'}).onfinish=()=>el.remove();
}
document.addEventListener('click',e=>{
  for(let i=0;i<16;i++){
    const b=document.createElement('div');
    const c=SPARK_COLS[Math.floor(Math.random()*SPARK_COLS.length)];
    const a=(i/16)*Math.PI*2, d=40+Math.random()*60;
    b.style.cssText=`position:fixed;left:${e.clientX}px;top:${e.clientY}px;
      width:8px;height:8px;border-radius:50%;pointer-events:none;z-index:997;
      background:${c};box-shadow:0 0 10px ${c};transform:translate(-50%,-50%);`;
    document.body.appendChild(b);
    b.animate([
      {opacity:1,transform:'translate(-50%,-50%) scale(1)'},
      {opacity:0,transform:`translate(calc(-50% + ${Math.cos(a)*d}px),calc(-50% + ${Math.sin(a)*d}px)) scale(0)`}
    ],{duration:500,easing:'ease-out'}).onfinish=()=>b.remove();
  }
});

// ══════════════════════════════════════════════
//  LIGHTBOX
// ══════════════════════════════════════════════
function openLb(img){ document.getElementById('lb-img').src=img.src; document.getElementById('lightbox').classList.add('open'); }
function closeLb(){ document.getElementById('lightbox').classList.remove('open'); }

// ══════════════════════════════════════════════
//  KEYBOARD
// ══════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' ') navigate(1);
  if(e.key==='ArrowLeft') navigate(-1);
  if(e.key==='Escape') closeLb();
  if(e.key==='f'||e.key==='F') document.documentElement.requestFullscreen?.();
});

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
renderSlide(0);
</script>
